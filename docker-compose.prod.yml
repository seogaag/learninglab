# Production Docker Compose for AWS Lightsail
# Single entry point: nginx on port 80 (frontend + API proxy)
# Root .env or .env.production: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
services:
  nginx:
    image: nginx:alpine
    container_name: insighthub_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: insighthub_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-insighthub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Don't expose 5432 externally in prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insighthub_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-insighthub}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Empty = same origin (nginx proxies API)
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: insighthub_frontend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  certbot_www:

